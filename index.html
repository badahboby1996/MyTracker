<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Моят Ритъм | Health Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #faf8f5;
            --primary-sage: #8ba88e;
            --primary-sage-dark: #6d8f71;
            --primary-sage-light: #dbe4dc;
            --accent-pink: #dfbfbe;
            --accent-pink-dark: #e0a9a8;
            --text-main: #4a4a4a;
            --text-light: #888888;
            --card-bg: #ffffff;
            --shadow: 0 8px 20px rgba(139, 168, 142, 0.15);
            --border-radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 100px; /* Space for bottom nav */
            line-height: 1.5;
        }

        /* Header & Logo */
        header {
            background-color: var(--card-bg);
            padding: 15px 20px 12px;
            text-align: center;
            border-bottom-left-radius: var(--border-radius);
            border-bottom-right-radius: var(--border-radius);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .logo-svg {
            width: 28px;
            height: 28px;
            fill: var(--primary-sage);
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-sage);
            letter-spacing: 0.5px;
        }

        /* Water tracker */
        .water-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin-bottom: 12px;
        }

        .water-cup {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid var(--primary-sage-light);
            background: #fff;
            font-size: 14px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: transparent;
            font-family: inherit;
            padding: 0;
        }

        .water-cup.filled {
            background: #cfe3ee;
            border-color: #9cc4d8;
            color: inherit;
        }

        .water-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-light);
            margin-left: 4px;
            min-width: 44px;
            text-align: left;
        }

        /* Progress Bar */
        .progress-wrapper {
            background: var(--primary-sage-light);
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-sage);
            width: 0%;
            transition: width 0.4s ease-out;
            border-radius: 10px;
        }

        .progress-text {
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .week-progress-text {
            font-size: 0.8rem;
            color: var(--primary-sage-dark);
            font-weight: 700;
            margin-top: 2px;
        }

        /* Main Content */
        main {
            padding: 20px 15px;
        }

        .date-heading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .today-badge {
            font-size: 0.65rem;
            font-weight: 700;
            background: var(--primary-sage);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .swipe-hint {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-light);
            margin-bottom: 10px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 25px 0 15px;
            color: var(--accent-pink);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 18px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: transform 0.2s;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
        }

        .card-info {
            flex-grow: 1;
        }

        .card-type {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-pink);
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-macros {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .appliance-chip {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--primary-sage-dark);
            background: var(--primary-sage-light);
            border-radius: 10px;
            padding: 2px 10px;
            margin-top: 6px;
        }

        /* Custom Checkbox */
        .checkbox-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .checkbox-wrapper input {
            appearance: none;
            -webkit-appearance: none;
            width: 32px;
            height: 32px;
            border: 2px solid var(--primary-sage-light);
            border-radius: 50%;
            outline: none;
            transition: all 0.3s;
            background: #fff;
            margin: 0;
        }

        .checkbox-wrapper input:checked {
            background: var(--primary-sage);
            border-color: var(--primary-sage);
        }

        .checkbox-wrapper input:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 18px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .card.completed .card-title {
            text-decoration: line-through;
            color: var(--text-light);
        }

        /* Expandable Recipe/Prep Details */
        details {
            background: #fdfdfd;
            border-radius: 12px;
            padding: 10px 15px;
            margin-top: 10px;
            border: 1px solid #f0f0f0;
        }

        summary {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-sage);
            cursor: pointer;
            list-style: none;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary::after {
            content: '+';
            font-size: 1.2rem;
            font-weight: 400;
            flex-shrink: 0;
            margin-left: 10px;
        }

        details[open] summary::after {
            content: '−';
        }

        .prep-content {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--text-main);
            border-top: 1px dashed var(--primary-sage-light);
            padding-top: 10px;
        }

        .prep-content strong {
            color: var(--primary-sage);
        }

        .prep-content ul, .prep-content ol {
            padding-left: 20px;
            margin: 6px 0 10px;
        }

        .prep-content li {
            margin-bottom: 4px;
        }

        .prep-note {
            background: #faf3f3;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 0.8rem;
            color: #a98685;
            margin-top: 6px;
        }

        /* Heatmap */
        .hm-scroll {
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .hm-grid {
            display: grid;
            grid-template-rows: repeat(7, 13px);
            grid-auto-flow: column;
            grid-auto-columns: 13px;
            gap: 3px;
            width: max-content;
        }

        .hm-cell {
            width: 13px;
            height: 13px;
            border-radius: 3px;
            background: #eef1ee;
            border: none;
            padding: 0;
            cursor: pointer;
        }

        .hm-cell.l1 { background: #cdddd0; }
        .hm-cell.l2 { background: #a8c4ac; }
        .hm-cell.l3 { background: var(--primary-sage); }
        .hm-cell.l100 { background: var(--accent-pink-dark); }
        .hm-cell.future { background: #f6f6f4; cursor: default; }
        .hm-cell.today { outline: 2px solid var(--primary-sage-dark); outline-offset: 1px; }
        .hm-cell.viewing { box-shadow: 0 0 0 2px var(--accent-pink-dark) inset; }

        .hm-legend {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            color: var(--text-light);
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .hm-legend .hm-cell { cursor: default; }

        /* Weight chart */
        .weight-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .weight-input-row input {
            flex: 1;
            min-width: 0;
            padding: 10px 12px;
            border: 2px solid var(--primary-sage-light);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            color: var(--text-main);
        }

        .weight-input-row input:focus {
            border-color: var(--primary-sage);
        }

        .weight-save-btn {
            padding: 10px 18px;
            background: var(--primary-sage);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .weight-meta {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .weight-chart-wrap svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Bottom Navigation (Days) */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--card-bg);
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
            display: flex;
            overflow-x: auto;
            padding: 10px 5px 20px;
            scroll-snap-type: x mandatory;
            z-index: 100;
        }

        nav::-webkit-scrollbar {
            display: none;
        }

        .day-tab {
            flex: 0 0 auto;
            width: 48px;
            padding: 8px 2px;
            text-align: center;
            margin: 0 2px;
            border-radius: 16px;
            background: transparent;
            border: none;
            color: var(--text-light);
            font-family: inherit;
            font-weight: 600;
            font-size: 0.8rem;
            scroll-snap-align: center;
            transition: all 0.3s;
            position: relative;
            cursor: pointer;
        }

        .day-tab .day-name {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .day-tab .day-num {
            display: block;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .day-tab .today-dot {
            display: block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-pink-dark);
            margin: 3px auto 0;
        }

        .day-tab.active {
            background: var(--primary-sage);
            color: white;
            box-shadow: 0 4px 10px rgba(139, 168, 142, 0.4);
        }

        .day-tab.active .today-dot {
            background: #fff;
        }

        .day-tab.is-today:not(.active) {
            color: var(--primary-sage-dark);
        }

        /* Floating "Today" button */
        .today-btn {
            position: fixed;
            bottom: 95px;
            right: 15px;
            z-index: 99;
            background: var(--accent-pink-dark);
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 12px 20px;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.85rem;
            box-shadow: 0 6px 15px rgba(224, 169, 168, 0.5);
            cursor: pointer;
            display: none;
        }

        .today-btn.visible {
            display: block;
        }

        /* Reset Button */
        .reset-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 30px;
            background: transparent;
            border: 2px dashed var(--accent-pink);
            color: var(--accent-pink);
            border-radius: var(--border-radius);
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
            cursor: pointer;
        }

        /* Messages */
        .rest-day-msg {
            text-align: center;
            padding: 30px 20px;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            color: var(--primary-sage);
            font-weight: 600;
            box-shadow: var(--shadow);
            margin-bottom: 15px;
        }

        /* Confetti */
        .confetti {
            position: fixed;
            top: -15px;
            z-index: 1000;
            pointer-events: none;
            border-radius: 2px;
            animation: confetti-fall linear forwards;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(110vh) rotate(720deg);
            }
        }

        .celebrate-heart {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            z-index: 1001;
            pointer-events: none;
            animation: heart-pop 1.6s ease-out forwards;
        }

        @keyframes heart-pop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            60% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -80%) scale(1); opacity: 0; }
        }

        /* Day swipe animations */
        .slide-in-left {
            animation: slideInLeft 0.25s ease-out;
        }

        .slide-in-right {
            animation: slideInRight 0.25s ease-out;
        }

        @keyframes slideInLeft {
            from { transform: translateX(40px); opacity: 0.4; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideInRight {
            from { transform: translateX(-40px); opacity: 0.4; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Info list styling */
        .info-list {
            padding-left: 20px;
            font-size: 0.85rem;
        }

        .info-list li {
            margin-bottom: 6px;
        }

        .info-subtitle {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--primary-sage);
            text-transform: uppercase;
            margin: 10px 0 5px;
        }
    </style>
</head>

        const rulesHTML = `

        // ===== State (history keyed by date "YYYY-MM-DD") =====
        const STORAGE_KEY = 'mrs_fitness_tracker_v2';
        const OLD_STORAGE_KEY = 'mrs_fitness_tracker_state';

        const WEIGHT_START = 68;
        const WEIGHT_GOAL = 58;
        const WATER_GOAL = 8;

        function todayStr() {
            return fmtDate(new Date());
        }

        function fmtDate(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${dd}`;
        }

        function parseDate(s) {
            const [y, m, d] = s.split('-').map(Number);
            return new Date(y, m - 1, d);
        }

        function addDays(s, n) {
            const d = parseDate(s);
            d.setDate(d.getDate() + n);
            return fmtDate(d);
        }

        function mondayOf(s) {
            const d = parseDate(s);
            const wd = (d.getDay() + 6) % 7; // 0 = Monday
            d.setDate(d.getDate() - wd);
            return fmtDate(d);
        }

        function loadState() {
            let s = null;
            try { s = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch (e) {}
            if (!s || typeof s !== 'object') {
                s = { days: {}, weights: [] };
                // Migrate the old flat checkbox state (no dates) into today's entry
                try {
                    const old = JSON.parse(localStorage.getItem(OLD_STORAGE_KEY));
                    if (old && typeof old === 'object') {
                        s.days[todayStr()] = { tasks: old, water: 0 };
                        localStorage.removeItem(OLD_STORAGE_KEY);
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
                    }
                } catch (e) {}
            }
            if (!s.days) s.days = {};
            if (!Array.isArray(s.weights)) s.weights = [];
            return s;
        }

        let state = loadState();

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function dayState(dateStr) {
            if (!state.days[dateStr]) state.days[dateStr] = { tasks: {}, water: 0 };
            if (!state.days[dateStr].tasks) state.days[dateStr].tasks = {};
            if (typeof state.days[dateStr].water !== 'number') state.days[dateStr].water = 0;
            return state.days[dateStr];
        }

        function planFor(dateStr) {
            return planData[parseDate(dateStr).getDay()];
        }

        function allTasks(plan) {
            return plan.workouts.concat(plan.meals);
        }

        function dayPercent(dateStr) {
            const plan = planFor(dateStr);
            const total = allTasks(plan).length;
            if (total === 0) return 100;
            const tasks = (state.days[dateStr] || {}).tasks || {};
            let done = 0;
            allTasks(plan).forEach(t => { if (tasks[t.id]) done++; });
            return Math.round((done / total) * 100);
        }

        function weekPercent(refDateStr) {
            const mon = mondayOf(refDateStr);
            const today = todayStr();
            let total = 0, done = 0;
            for (let i = 0; i < 7; i++) {
                const ds = addDays(mon, i);
                if (ds > today) break; // only elapsed days count
                const plan = planFor(ds);
                const tasks = (state.days[ds] || {}).tasks || {};
                allTasks(plan).forEach(t => {
                    total++;
                    if (tasks[t.id]) done++;
                });
            }
            return total === 0 ? 0 : Math.round((done / total) * 100);
        }

        // ===== App =====
        const BG_MONTHS = ['януари', 'февруари', 'март', 'април', 'май', 'юни', 'юли', 'август', 'септември', 'октомври', 'ноември', 'декември'];
        const BG_DAYS_SHORT = { 1: 'ПН', 2: 'ВТ', 3: 'СР', 4: 'ЧТ', 5: 'ПТ', 6: 'СБ', 0: 'НД' };
        const BG_DAYS_FULL = { 1: 'Понеделник', 2: 'Вторник', 3: 'Сряда', 4: 'Четвъртък', 5: 'Петък', 6: 'Събота', 0: 'Неделя' };
        const HEATMAP_WEEKS = 24; // ~5-6 month goal

        let currentDate = todayStr();

        function init() {

        function renderAll(slideDir) {
            renderNav();
            renderWater();
            renderDay(slideDir);

        function goToDate(dateStr, smooth) {
            const slideDir = dateStr > currentDate ? 'left' : (dateStr < currentDate ? 'right' : null);
            currentDate = dateStr;
            renderAll(smooth ? null : slideDir);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateTodayButton() {
            todayBtn.classList.toggle('visible', currentDate !== todayStr());
        }

        // --- Bottom nav: the week of the currently viewed date, with real dates ---
        function renderNav() {
            const mon = mondayOf(currentDate);
            const today = todayStr();
            bottomNav.innerHTML = '';
            for (let i = 0; i < 7; i++) {
                const ds = addDays(mon, i);
                const d = parseDate(ds);
                const btn = document.createElement('button');
                const isToday = ds === today;

                    + (ds === currentDate ? ' active' : '')
                    + (isToday ? ' is-today' : '');

                    <span class="day-name">${BG_DAYS_SHORT[d.getDay()]}</span>

        // --- Water tracker (per viewed day) ---
        function renderWater() {
            const ds = dayState(currentDate);

            const ds = dayState(currentDate);

            saveState();
            renderWater();

            // Meals Section

            plan.meals.forEach(m => {
                const isChecked = tasks[m.id] ? 'checked' : '';

                                <strong>Продукти и грамажи:</strong>
                                <ul>${ingredientsList}</ul>
                                <strong>Начин на приготвяне:</strong>
                                <ol>${stepsList}</ol>
                                ${m.note ? `<div class="prep-note">${m.note}</div>` : ''}

            // Progress section: heatmap + weight
            html += `<h2 class="section-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>

                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                Инфо
            </h2>`;
            html += `
                <div class="card">
                    <details>
                        <summary>🛒 Списък за пазаруване (седмица)</summary>
                        <div class="prep-content">${shoppingListHTML}</div>
                    </details>
                </div>
                <div class="card">
                    <details>
                        <summary>📋 Правила за придържане</summary>
                        <div class="prep-content">${rulesHTML}</div>
                    </details>
                </div>
            `;

            // Reset button (this day only — history stays intact)
            html += `<button class="reset-btn" onclick="confirmReset()">Изчисти отметките за този ден</button>`;

            appContent.innerHTML = html;

            if (slideDir) {
                appContent.classList.remove('slide-in-left', 'slide-in-right');
                void appContent.offsetWidth; // restart animation
                appContent.classList.add(slideDir === 'left' ? 'slide-in-left' : 'slide-in-right');
            }

            initWeightCard();
            scrollHeatmapToEnd();
        }

        // --- Heatmap (GitHub-style) ---
        function renderHeatmapCard() {
            const today = todayStr();
            const startMon = addDays(mondayOf(today), -(HEATMAP_WEEKS - 1) * 7);
            let cells = '';
            for (let w = 0; w < HEATMAP_WEEKS; w++) {
                for (let i = 0; i < 7; i++) {
                    const ds = addDays(startMon, w * 7 + i);
                    let cls = 'hm-cell';
                    let clickable = false;
                    if (ds > today) {
                        cls += ' future';
                    } else {
                        const pct = dayPercent(ds);
                        if (pct === 100) cls += ' l100';
                        else if (pct >= 67) cls += ' l3';
                        else if (pct >= 34) cls += ' l2';
                        else if (pct >= 1) cls += ' l1';
                        clickable = true;
                    }
                    if (ds === today) cls += ' today';
                    if (ds === currentDate) cls += ' viewing';
                    cells += clickable
                        ? `<button class="${cls}" onclick="goToDate('${ds}')" title="${ds}"></button>`
                        : `<span class="${cls}"></span>`;
                }
            }
            return `
                <div class="card">
                    <div class="card-title">Календар на постоянството</div>
                    <div class="hm-scroll" id="hm-scroll"><div class="hm-grid">${cells}</div></div>
                    <div class="hm-legend">
                        По-малко
                        <span class="hm-cell"></span>
                        <span class="hm-cell l1"></span>
                        <span class="hm-cell l2"></span>
                        <span class="hm-cell l3"></span>
                        <span class="hm-cell l100"></span>
                        Повече · розово = 100% ден
                    </div>
                    <div class="card-macros">Последните ${HEATMAP_WEEKS} седмици · докосни квадратче, за да видиш деня.</div>
                </div>
            `;
        }

        function scrollHeatmapToEnd() {
            const el = document.getElementById('hm-scroll');
            if (el) el.scrollLeft = el.scrollWidth;
        }

        // --- Weight tracking (weekly) ---
        function renderWeightCard() {
            const sorted = [...state.weights].sort((a, b) => a.date < b.date ? -1 : 1);
            const latest = sorted[sorted.length - 1];
            let metaText;
            if (latest) {
                const diff = (latest.kg - WEIGHT_GOAL);
                metaText = `Последно: <strong>${latest.kg} кг</strong> (${latest.date}) · още <strong>${diff > 0 ? diff.toFixed(1) : 0} кг</strong> до целта ${WEIGHT_GOAL} кг`;
            } else {
                metaText = `Старт: ${WEIGHT_START} кг · Цел: <strong>${WEIGHT_GOAL} кг</strong>. Запиши първото си тегло!`;
            }
            return `
                <div class="card">
                    <div class="card-title">Тегло — веднъж седмично</div>
                    <div class="card-macros">Сутрин, на гладно, в един и същи ден. Гледа се трендът, не отделното число.</div>
                    <div class="weight-input-row">
                        <input type="number" id="weight-input" step="0.1" min="40" max="150" placeholder="напр. 66.5" inputmode="decimal">
                        <button class="weight-save-btn" onclick="saveWeight()">Запиши</button>
                    </div>
                    <div class="weight-meta" id="weight-meta">${metaText}</div>
                    <div class="weight-chart-wrap" id="weight-chart">${renderWeightChart(sorted)}</div>
                </div>
            `;
        }

        function initWeightCard() {
            const input = document.getElementById('weight-input');
            if (input) {
                input.addEventListener('keydown', e => { if (e.key === 'Enter') saveWeight(); });
            }
        }

        function saveWeight() {
            const input = document.getElementById('weight-input');
            const kg = parseFloat(input.value);
            if (isNaN(kg) || kg < 40 || kg > 150) {
                alert('Моля, въведи валидно тегло (напр. 66.5).');
                return;
            }
            const today = todayStr();
            const thisWeek = mondayOf(today);
            // One entry per week: replace this week's entry if it exists
            state.weights = state.weights.filter(w => mondayOf(w.date) !== thisWeek);
            state.weights.push({ date: today, kg: Math.round(kg * 10) / 10 });
            saveState();
            renderDay(); // re-render to refresh chart + meta
            updateProgress();
        }

        function renderWeightChart(sorted) {
            const W = 340, H = 180, padL = 34, padR = 12, padT = 14, padB = 26;
            const plotW = W - padL - padR, plotH = H - padT - padB;

            const kgs = sorted.map(e => e.kg);
            const yMax = Math.max(WEIGHT_START + 1, ...(kgs.length ? [Math.max(...kgs) + 1] : []));
            const yMin = WEIGHT_GOAL - 2;
            const yPos = kg => padT + (yMax - kg) / (yMax - yMin) * plotH;
            const xPos = i => sorted.length <= 1 ? padL + plotW / 2 : padL + (i / (sorted.length - 1)) * plotW;

            // Horizontal gridlines every 2 kg
            let grid = '';
            for (let kg = Math.ceil(yMin); kg <= Math.floor(yMax); kg++) {
                if (kg % 2 !== 0) continue;
                const y = yPos(kg);
                grid += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#f0f0ec" stroke-width="1"/>`;
                grid += `<text x="${padL - 6}" y="${y + 3}" font-size="9" fill="#aaaaaa" text-anchor="end" font-family="Montserrat, sans-serif">${kg}</text>`;
            }

            // Goal line
            const gy = yPos(WEIGHT_GOAL);
            const goal = `
                <line x1="${padL}" y1="${gy}" x2="${W - padR}" y2="${gy}" stroke="#e0a9a8" stroke-width="1.5" stroke-dasharray="5,4"/>
                <text x="${W - padR}" y="${gy - 4}" font-size="9" fill="#e0a9a8" text-anchor="end" font-weight="bold" font-family="Montserrat, sans-serif">Цел ${WEIGHT_GOAL} кг</text>
            `;

            // Data line + points
            let line = '', points = '', labels = '';
            if (sorted.length > 0) {
                const pts = sorted.map((e, i) => `${xPos(i)},${yPos(e.kg)}`).join(' ');
                if (sorted.length > 1) {
                    line = `<polyline points="${pts}" fill="none" stroke="#8ba88e" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
                }
                sorted.forEach((e, i) => {
                    points += `<circle cx="${xPos(i)}" cy="${yPos(e.kg)}" r="3.5" fill="#8ba88e" stroke="#fff" stroke-width="1.5"/>`;
                });
                // Label first and last
                const first = sorted[0], last = sorted[sorted.length - 1];
                labels += `<text x="${xPos(0)}" y="${yPos(first.kg) - 8}" font-size="9" fill="#6d8f71" text-anchor="middle" font-weight="bold" font-family="Montserrat, sans-serif">${first.kg}</text>`;
                if (sorted.length > 1) {
                    labels += `<text x="${xPos(sorted.length - 1)}" y="${yPos(last.kg) - 8}" font-size="9" fill="#6d8f71" text-anchor="middle" font-weight="bold" font-family="Montserrat, sans-serif">${last.kg}</text>`;
                }
            } else {
                labels = `<text x="${W / 2}" y="${H / 2}" font-size="11" fill="#bbbbbb" text-anchor="middle" font-family="Montserrat, sans-serif">Тук ще се появи твоята линия към целта 🤍</text>`;
            }

            return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Графика на теглото">${grid}${goal}${line}${points}${labels}</svg>`;
        }

        // --- Tasks & progress ---
        function toggleTask(id) {
            const ds = dayState(currentDate);
            const before = dayPercent(currentDate);
            ds.tasks[id] = !ds.tasks[id];
            saveState();

            const card = document.getElementById(`card-${id}`);
            if (card) card.classList.toggle('completed', !!ds.tasks[id]);

            updateProgress();

            const after = dayPercent(currentDate);
            if (after === 100 && before < 100) {
                celebrate();
            }
        }

        function updateProgress() {
            const plan = planFor(currentDate);
            const tasks = dayState(currentDate).tasks;
            const total = allTasks(plan).length;
            let completed = 0;
            allTasks(plan).forEach(t => { if (tasks[t.id]) completed++; });

            const percentage = total === 0 ? 100 : Math.round((completed / total) * 100);
            progressFill.style.width = `${percentage}%`;

            if (percentage === 100) {
                progressText.innerHTML = `Прогрес за деня: <strong>Браво! Всичко е изпълнено! 🎉</strong>`;
                progressFill.style.background = 'var(--accent-pink-dark)';
            } else {
                progressText.innerHTML = `Прогрес за деня: ${percentage}% (${completed} от ${total})`;
                progressFill.style.background = 'var(--primary-sage)';
            }

            weekProgressText.textContent = `Тази седмица: ${weekPercent(todayStr())}%`;
        }

        // --- Celebration: confetti + heart ---
        function celebrate() {
            const colors = ['#8ba88e', '#dfbfbe', '#e0a9a8', '#f2d5a0', '#a8c8e0', '#dbe4dc'];
            for (let i = 0; i < 70; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                const size = 6 + Math.random() * 6;
                c.style.left = Math.random() * 100 + 'vw';
                c.style.width = size + 'px';
                c.style.height = size * (0.6 + Math.random() * 0.8) + 'px';
                c.style.background = colors[Math.floor(Math.random() * colors.length)];
                c.style.animationDuration = (2 + Math.random() * 1.8) + 's';
                c.style.animationDelay = (Math.random() * 0.4) + 's';
                if (Math.random() < 0.3) c.style.borderRadius = '50%';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 4500);
            }
            const heart = document.createElement('div');
            heart.className = 'celebrate-heart';
            heart.textContent = '💚';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1700);
        }

        // --- Swipe between days ---
        function setupSwipe() {
            let startX = 0, startY = 0, tracking = false;

            document.addEventListener('touchstart', e => {
                // Don't hijack horizontally scrollable areas
                if (e.target && e.target.closest && e.target.closest('.hm-scroll, nav, input, .weight-input-row')) {
                    tracking = false;
                    return;
                }
                tracking = true;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, { passive: true });

            document.addEventListener('touchend', e => {
                if (!tracking) return;
                tracking = false;
                const dx = e.changedTouches[0].clientX - startX;
                const dy = e.changedTouches[0].clientY - startY;
                if (Math.abs(dx) > 60 && Math.abs(dx) > 2 * Math.abs(dy)) {
                    if (dx < 0) {
                        goToDate(addDays(currentDate, 1)); // swipe left → next day
                    } else {
                        goToDate(addDays(currentDate, -1)); // swipe right → previous day
                    }
                }
            }, { passive: true });
        }

        // --- Reset (viewed day only — history is preserved) ---
        function confirmReset() {
            const d = parseDate(currentDate);
            if (confirm(`Сигурна ли си, че искаш да изчистиш отметките за ${BG_DAYS_FULL[d.getDay()].toLowerCase()}, ${d.getDate()} ${BG_MONTHS[d.getMonth()]}? Историята на другите дни се пази.`)) {
                dayState(currentDate).tasks = {};
                saveState();
                renderAll();
            }
        }

        // Initialize App
        init();

    </script>
</body>
</html>
